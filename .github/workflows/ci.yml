name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test, build, and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Run CI checks
        run: scripts/check-ci.sh --ci-runner

      - name: Build binary
        run: cargo build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate LCOV report
        run: cargo llvm-cov --lib --tests --ignore-filename-regex 'src/(main.rs|io/.*|sys/.*)' --lcov --output-path lcov.info

      - name: Generate coverage badge
        run: scripts/generate-coverage-badge.sh lcov.info assets/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- assets/coverage.svg; then
            echo "Coverage badge is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/coverage.svg
          git commit -m "Update coverage badge [skip ci]"
          git push
